site_name: markstay
site_description: "markstay: stable identity for Markdown blocks"
site_url: https://markstay.org/
repo_url: https://github.com/markstaymd/markstay
repo_name: markstaymd/markstay
edit_uri: edit/master/docs/

copyright: Released under CC BY 4.0. Code samples under MIT.

theme:
  name: material
  logo: assets/logo.svg
  favicon: assets/favicon.svg
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.details

plugins:
  - search

nav:
  - Home: index.md
  - Get started: get-started.md
  - Demo: demo.md
  - Specification: spec.md
  - Implementations: implementations.md
  - Examples: examples.md
  - Plate: plate.md
  - RAG cache: rag.md
  - Prior art: prior-art.md
  - Findings:
      - LLM marker survival: evaluation.md
      - Public dogfood case study: dogfood.md
      - Reference linter: linter.md
  - FAQ: faq.md
